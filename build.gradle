import javax.imageio.*;
import javax.imageio.stream.*;
import java.awt.image.*;
import java.io.*;

plugins {
    id "java"
}

version = "2.4.0"
sourceSets.main.java.srcDirs = ["src"]

repositories {
    mavenLocal()
    mavenCentral()
    //maven { url "https://raw.githubusercontent.com/Anuken/MavenRepositories/master/repository" }
    maven { url "https://jitpack.io" }
    maven { url "https://mirror.yandex.ru/mirrors/maven2/" }
}

ext {
    mindustryVersion = "v158.1"
    arcVersion = "v158.1"
}

configurations.all {
    resolutionStrategy {
        force "com.github.Anuken.Arc:arc-core:$arcVersion"
        force "com.github.Anuken.Arc:flabel:$arcVersion"
        force "com.github.Anuken.Arc:freetype:$arcVersion"
        force "com.github.Anuken.Arc:g3d:$arcVersion"
        force "com.github.Anuken.Arc:fx:$arcVersion"
        force "com.github.Anuken.Arc:arcnet:$arcVersion"
    }
}

allprojects {
    tasks.withType(JavaCompile) {
        options.encoding = "UTF-8"
        options.compilerArgs.addAll(["--release", "8"])
    }
}

dependencies {
    compileOnly "com.github.Anuken.Mindustry:core:$mindustryVersion"
}

def framesBuildDir = file("build/tmp/frames")

task convertGifFrames {
    description = "Convert .gif files in assets/sprites to individual frame .png files in build/tmp/frames"
    doLast {
        File assetsDir = file("assets")
        if (!assetsDir.exists()) return

        delete framesBuildDir

        fileTree(dir: assetsDir, include: "**/*.gif").each { gifFile ->
            println "Converting: ${gifFile.name}"
            try {
                ImageInputStream input = ImageIO.createImageInputStream(gifFile)
                Iterator<ImageReader> readers = ImageIO.getImageReaders(input)
                if (!readers.hasNext()) {
                    println "  No reader for: ${gifFile.name}"
                    input.close()
                    return
                }
                ImageReader reader = readers.next()
                reader.setInput(input)

                int frameCount = reader.getNumImages(true)
                println "  Frames: $frameCount"

                String baseName = gifFile.name[0..gifFile.name.toLowerCase().lastIndexOf(".gif")-1]

                String relativeDir = assetsDir.toPath().relativize(gifFile.parentFile.toPath()).toString()
                File outDir = new File(framesBuildDir, relativeDir)
                outDir.mkdirs()

                for (int i = 0; i < frameCount; i++) {
                    BufferedImage frame = reader.read(i)
                    File outFile = new File(outDir, "${baseName}${i}.png")
                    ImageIO.write(frame, "png", outFile)
                    println "    -> ${outFile.name}"
                }

                reader.dispose()
                input.close()
            } catch (Exception e) {
                println "  Error: ${e.message}"
            }
        }
    }
}

clean {
    delete framesBuildDir
}

tasks.named("jar") {
    dependsOn convertGifFrames
}

jar {
    archiveFileName = "FadingRevelations.jar"
    from sourceSets.main.output
    from files("mod.hjson")
    from(fileTree("assets")) {
        exclude "**/*.gif"
    }
    from fileTree(framesBuildDir)
    duplicatesStrategy = DuplicatesStrategy.INCLUDE
}
