block.advanced-reassembly-chamber.description = Verbessert Einheiten auf die dritte Stufe. Sie können noch einmal verbessert werden.

block.basic-reassembly-chamber.name = Einfache Neumontagekammer
block.basic-reassembly-chamber.description = Verbessert Einheiten, welche in der Primären Fabrik hergestellt wurden. Einheiten, die in dieser Neumontagekammer hergestellt wurden, können weiter verbessert werden.


