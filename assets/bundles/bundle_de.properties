planet.cerbero.name = Cerbero
planet.cerbero.description = Ein verlassener planet auf dem vor langer Zeit eine Tragödie passierte. Nichts ist hier übrig geblieben außer Zerstörung und Tod.

planet.hathor.name = Hathor
planet.hathor.description = Ein kleines Stück von Cerbero erschaffen durch einen Meteoriteneinschlag. Nichts kann hier bestehen bleiben außer eine uralte cerberianische Basis welche hier gebaut wurde bevor alles zusammenfiel...


