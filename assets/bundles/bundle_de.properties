block.big-swarmer.name = Assail
block.big-swarmer.description = Eine bessere Version des Schwärmers mit höherem Schaden und Schussgeschwindigkeit.

block.corrupted-cyclone.name = Hurricane
block.corrupted-cyclone.description = Eine bessere Version des Zyklons.

block.gattling.name = Gattling
block.gattling.description = Ein Turm, der SEHR schnell feuert. 

block.mine-launcher.name = Minenwerfer
block.mine-launcher.description = Shießt Landminen, welche für längere Zeit auf dem Boden liegen bleiben und bei Kontakt eplodieren.

block.missile-silo.name = Raketensilo
block.missile-silo.description = Braucht eine LANGE Zeit zur Vorbereitung. Shießt mit tödlichen Nuklearraketen.

block.ore-turret.name = Itemslinger
block.ore-turret.description = Shießt rohe Stücke Erz/Material auf Gegner.

block.ring-turret.name = S.E.H.R.A.K
block.ring-turret.description = Shießt zwei Schüsse, welche sich bei Kontakt oder nach einiger Entfernung in viele kleinere Kugeln aufteilen.

block.sear.name = Brutzler
block.sear.description = Eine bessere Version des Flammenwerfers. Hat mehr Reichweite und verursacht mehr Schaden.

block.shotgun.name = Schrotflinte
block.shotgun.description = Eine Schrotflinte. Gegner nehmen mehr Schaden, je näher sie an diesem Turm sind.

block.sniper.name = Scharfschützenturm
block.sniper.description = Ein Turm mit sehr hoher Reichweite und hohem Schaden aber niedriger Schussrate.

block.sunflare.name = Sunneneruption
block.sunflare.description = Der letzte Turm in der Familie des Flammenwerfers. Shießt eine große Menge tödlichen Feuers.

block.trio.name = Trio
block.trio.description = Wie ein Duo aber schießt aus 3 anstatt nur 2 Rohren.

block.upgrade-turret.name = Von Turmheim
block.upgrade-turret.description = Ein Turm, dessen Schüsse verschiedene Effekte haben, basierend auf der genutzen Munitionsart.

block.big-scatter.name = Shatter
block.big-scatter.description = Eine bessere Version des Luftgeschützes.

#liquid turrets

block.zephyr.name = Zephyr
block.zephyr.description = Nutzt Dampf, um hochkonzentrierte Schüsse auf Gegner abzufeuern, die zwar keinen Schaden verursachen aber die Gegner weit zurückstoßen.

block.batter.name = Schläger
block.batter.description = Schießt hochkonzentrierte Flüssigkeitskugeln, um Gegner zurückzuschlagen.

block.sprunkler.name = Sprinkler
block.sprunkler.description = Shießt eine große Menge an Wasser. Sollte nicht im Kampf genutzt werden sondern nur, um Feuer zu löschen.

#power turrets

block.kugelblitz.name = Kugelblitz
block.kugelblitz.description = Lädt leitende Materialien stark auf und erschafft somit mächtige Kugelblitze, die Blitze speien um Gegner auszulöschen.

block.air-arc.name = Luft Arcus
block.air-arc.description = Ein Arcus, welcher nur Luftgegner anvisieren kann.

block.big-arc.name = Arcussturm
block.big-arc.description = Ein Arcus, der erhöhte Feuerkraft durch höheren Schaden und niedrigere Nachladezeit besitzt.

block.big-parallax.name = Deracination
block.big-parallax.description = Ein besserer Parallax, welcher Gegner schneller heranzieht und dabei mehr Schaden verursacht.

block.big-segment.name = Fragment
block.big-segment.description = Ein besseres Segment, welches mehr Schaden gegen Kugeln verursacht. Kann keine Laser anvisieren.

block.cavalry.name = Kavalerie
block.cavalry.description = Ein großer Stromturm, der geladene Energiekugeln auf Gegner feuert.

block.mega-meltdown.name = Armageddon
block.mega-meltdown.description = Eine bessere Version des Meltdowns. Verursacht massig Schaden. Benötigt Flüssigkeit zum Feuern.

block.status-wave.name = Stasiswelle
block.status-wave.description = Sendet Schockwellen aus, die geringen Schaden verursachen dafür aber Gegner verlangsamen.

block.uhlan.name = Uhlan
block.uhlan.description = Eine bessere Version des Lancers.


#other turrets

block.construction-pylon.name = Konstruktionspfeiler
block.construction-pylon.description = Baut und zerstört automatisch Strukturen und unterstützt den Spieler.


