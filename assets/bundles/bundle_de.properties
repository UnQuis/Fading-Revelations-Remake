block.primary-factory.description = Erschafft kleine und leichte Einheiten, welche in Neumontagekammern verbessert werden können.

block.unit-repair-field.name = Einheiten Reparaturfeld
block.unit-repair-field.description = Heilt durchgehend Einheite in der Reichweite. Benötigt Kryoflüssigkeit.

