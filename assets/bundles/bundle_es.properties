#cerberian

unit.cerberian-penumbra.name = Antumbra Cerberiana
unit.cerberian-penumbra.description = Unidad con tecnología similar a la de una unidad Serpulo Antumbra, pero el cañón principal dispara un láser en lugar de balas normales.

unit.cerberian-curtulus.name = Arquídea Cerberiana
unit.cerberian-curtulus.description = Unidad de aspecto similar al Einehit arquídico, pero el cañón principal dispara balas líquidas en lugar de balas de artillería.

unit.cerberian-hexathelid.name = Cerbero Atrax
unit.cerberian-hexathelid.description = Unidad similar al Atrax pero que dispara balas de perdigones.

unit.cerberian-behemoth.name = [red]Behemoth Cerberiano
unit.cerberian-behemoth.description = Un enorme one-hit y el invento que más enorgullece a Cerbero. Dispara un láser masivo, enormes proyectiles de fragmentación, descargas láser y cañones FLAK más pequeños.

unit.cerberian-straggle.name = Cerberian Crawler
unit.cerberian-straggle.description = Versión cerberiana de la unidad crawler.

unit.cerberian-bayonet.name = Daga Cerberiana
unit.cerberian-bayonet.description = Una versión más fuerte de la unidad Daga, que suele encontrarse en Serpulo.

unit.cerberian-veil.name = Eclipse Cerberiano
unit.cerberian-veil.description = Como la unidad Eclipse, pero en lugar de fuego antiaéreo, esta unidad dispara cohetes. También dispara con un láser más potente.

unit.cerberian-spark.name = Bengala Cerberiana
unit.cerberian-spark.description = Unidad similar a la unidad de bengalas de Serpulo pero con armamento mejorado.

unit.cerberian-citadel.name = Fortaleza Cerberiana
unit.cerberian-citadel.description = Una versión mejorada de la Fortaleza Einehit, procedente de Cerbero.

unit.cerberian-vista.name = Horizonte Cerbero
unit.cerberian-vista.description = Una unidad como la unidad Horizon pero que lanza bombas más potentes.

unit.cerberian-cudgel.name = Maza cerberiana
unit.cerberian-cudgel.description = Una unidad similar a la Maza Einehit de Serpulo, pero más fuerte. Dispara con un tipo diferente de lanzallamas.

unit.cerberian-kaiser.name = Reino Cerbero
unit.cerberian-kaiser.description = Unidad inspirada en el Reinado Einehit de Serpulo pero con tecnología mejorada.

unit.cerberian-baton.name = Cetro Cerberiano
unit.cerberian-baton.description = Versión recién fabricada de la unidad Cetro.

unit.cerberian-nephila.name = Espirota cerberiana
unit.cerberian-nephila.description = Como la unidad Spiroct, pero roba más vidas usando láseres pokey mejorados.

unit.cerberian-setosus.name = Toxópido Cerbérico
unit.cerberian-setosus.description = Unidad similar a Toxopid. Los cañones secundarios disparan láseres debilitantes que quitan la vida en lugar de los normales.

unit.cerberian-summit.name = Cenit Cerberiano.
unit.cerberian-summit.description = Unidad similar a la unidad Zenith, pero los lanzacohetes disparan andanadas de cohetes en lugar de cohetes individuales.



