#cerberian

unit.fading-revelations-patched-cerberian-penumbra.name = Antumbra Cerberiana
unit.fading-revelations-patched-cerberian-penumbra.description = Unidad con tecnología similar a la de una unidad Serpulo Antumbra, pero el cañón principal dispara un láser en lugar de balas normales.

unit.fading-revelations-patched-cerberian-curtulus.name = Arquídea Cerberiana
unit.fading-revelations-patched-cerberian-curtulus.description = Unidad de aspecto similar al Einehit arquídico, pero el cañón principal dispara balas líquidas en lugar de balas de artillería.

unit.fading-revelations-patched-cerberian-hexathelid.name = Cerbero Atrax
unit.fading-revelations-patched-cerberian-hexathelid.description = Unidad similar al Atrax pero que dispara balas de perdigones.

unit.fading-revelations-patched-cerberian-behemoth.name = [red]Behemoth Cerberiano
unit.fading-revelations-patched-cerberian-behemoth.description = Un enorme one-hit y el invento que más enorgullece a Cerbero. Dispara un láser masivo, enormes proyectiles de fragmentación, descargas láser y cañones FLAK más pequeños.

unit.fading-revelations-patched-cerberian-straggle.name = Cerberian Crawler
unit.fading-revelations-patched-cerberian-straggle.description = Versión cerberiana de la unidad crawler.

unit.fading-revelations-patched-cerberian-bayonet.name = Daga Cerberiana
unit.fading-revelations-patched-cerberian-bayonet.description = Una versión más fuerte de la unidad Daga, que suele encontrarse en Serpulo.

unit.fading-revelations-patched-cerberian-veil.name = Eclipse Cerberiano
unit.fading-revelations-patched-cerberian-veil.description = Como la unidad Eclipse, pero en lugar de fuego antiaéreo, esta unidad dispara cohetes. También dispara con un láser más potente.

unit.fading-revelations-patched-cerberian-spark.name = Bengala Cerberiana
unit.fading-revelations-patched-cerberian-spark.description = Unidad similar a la unidad de bengalas de Serpulo pero con armamento mejorado.

unit.fading-revelations-patched-cerberian-citadel.name = Fortaleza Cerberiana
unit.fading-revelations-patched-cerberian-citadel.description = Una versión mejorada de la Fortaleza Einehit, procedente de Cerbero.

unit.fading-revelations-patched-cerberian-vista.name = Horizonte Cerbero
unit.fading-revelations-patched-cerberian-vista.description = Una unidad como la unidad Horizon pero que lanza bombas más potentes.

unit.fading-revelations-patched-cerberian-cudgel.name = Maza cerberiana
unit.fading-revelations-patched-cerberian-cudgel.description = Una unidad similar a la Maza Einehit de Serpulo, pero más fuerte. Dispara con un tipo diferente de lanzallamas.

unit.fading-revelations-patched-cerberian-kaiser.name = Reino Cerbero
unit.fading-revelations-patched-cerberian-kaiser.description = Unidad inspirada en el Reinado Einehit de Serpulo pero con tecnología mejorada.

unit.fading-revelations-patched-cerberian-baton.name = Cetro Cerberiano
unit.fading-revelations-patched-cerberian-baton.description = Versión recién fabricada de la unidad Cetro.

unit.fading-revelations-patched-cerberian-nephila.name = Espirota cerberiana
unit.fading-revelations-patched-cerberian-nephila.description = Como la unidad Spiroct, pero roba más vidas usando láseres pokey mejorados.

unit.fading-revelations-patched-cerberian-setosus.name = Toxópido Cerbérico
unit.fading-revelations-patched-cerberian-setosus.description = Unidad similar a Toxopid. Los cañones secundarios disparan láseres debilitantes que quitan la vida en lugar de los normales.

unit.fading-revelations-patched-cerberian-summit.name = Cenit Cerberiano.
unit.fading-revelations-patched-cerberian-summit.description = Unidad similar a la unidad Zenith, pero los lanzacohetes disparan andanadas de cohetes en lugar de cohetes individuales.



